components:
  schemas:
    Badge:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        description:
          type: string
      required:
      - description
      - id
      - name
    Booking:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        user:
          type: integer
          readOnly: true
        user_name:
          type: string
          readOnly: true
        showtime:
          type: integer
        booking_date:
          type: string
          format: date-time
          readOnly: true
        total_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,2})?$
        status:
          $ref: '#/components/schemas/StatusEnum'
        tickets:
          type: array
          items:
            $ref: '#/components/schemas/Ticket'
          readOnly: true
      required:
      - booking_date
      - id
      - showtime
      - tickets
      - user
      - user_name
    BookingCreate:
      type: object
      properties:
        showtime_id:
          type: integer
        seat_ids:
          type: array
          items:
            type: integer
          minItems: 1
        price_per_seat:
          type: string
          format: decimal
          pattern: ^-?\d{0,4}(?:\.\d{0,2})?$
          default: '50.00'
      required:
      - seat_ids
      - showtime_id
    Course:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 200
        description:
          type: string
        enrolled_count:
          type: integer
          readOnly: true
      required:
      - description
      - enrolled_count
      - id
      - title
    Login:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          writeOnly: true
      required:
      - email
      - password
    LoginResponse:
      type: object
      properties:
        access:
          type: string
        refresh:
          type: string
        user:
          $ref: '#/components/schemas/User'
      required:
      - access
      - refresh
      - user
    LogoutResponse:
      type: object
      properties:
        detail:
          type: string
      required:
      - detail
    Movie:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 200
        description:
          type: string
        duration:
          type: integer
          maximum: 2147483647
          minimum: 0
          description: Duration in minutes
        genre:
          type: string
          maxLength: 100
        rating:
          type: string
          format: decimal
          pattern: ^-?\d{0,2}(?:\.\d{0,1})?$
      required:
      - description
      - duration
      - genre
      - id
      - title
    PatchedBooking:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        user:
          type: integer
          readOnly: true
        user_name:
          type: string
          readOnly: true
        showtime:
          type: integer
        booking_date:
          type: string
          format: date-time
          readOnly: true
        total_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,2})?$
        status:
          $ref: '#/components/schemas/StatusEnum'
        tickets:
          type: array
          items:
            $ref: '#/components/schemas/Ticket'
          readOnly: true
    PatchedCourse:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 200
        description:
          type: string
        enrolled_count:
          type: integer
          readOnly: true
    PatchedMovie:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 200
        description:
          type: string
        duration:
          type: integer
          maximum: 2147483647
          minimum: 0
          description: Duration in minutes
        genre:
          type: string
          maxLength: 100
        rating:
          type: string
          format: decimal
          pattern: ^-?\d{0,2}(?:\.\d{0,1})?$
    PatchedPost:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        user:
          type: integer
          readOnly: true
        user_name:
          type: string
          readOnly: true
        content:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
        likes_count:
          type: integer
          readOnly: true
        comments_count:
          type: integer
          readOnly: true
    PatchedReport:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        admin:
          type: integer
          readOnly: true
        admin_name:
          type: string
          readOnly: true
        generated_at:
          type: string
          format: date-time
          readOnly: true
    PatchedShowtime:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        movie:
          type: integer
        movie_title:
          type: string
          readOnly: true
        date:
          type: string
          format: date
        time:
          type: string
          format: time
    PatchedUser:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
          maxLength: 254
        points:
          type: integer
          maximum: 2147483647
          minimum: 0
        role:
          $ref: '#/components/schemas/RoleEnum'
        profile:
          allOf:
          - $ref: '#/components/schemas/Profile'
          readOnly: true
    PatchedUserUpdate:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
          maxLength: 254
    Post:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        user:
          type: integer
          readOnly: true
        user_name:
          type: string
          readOnly: true
        content:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
        likes_count:
          type: integer
          readOnly: true
        comments_count:
          type: integer
          readOnly: true
      required:
      - comments_count
      - content
      - created_at
      - id
      - likes_count
      - user
      - user_name
    Profile:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        bio:
          type: string
        followers_count:
          type: integer
          maximum: 2147483647
          minimum: 0
      required:
      - id
    Recommendation:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        movie:
          allOf:
          - $ref: '#/components/schemas/Movie'
          readOnly: true
        type:
          type: string
          maxLength: 100
      required:
      - id
      - movie
      - type
    Register:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
          maxLength: 254
        password:
          type: string
          writeOnly: true
          minLength: 6
        role:
          allOf:
          - $ref: '#/components/schemas/RoleEnum'
          readOnly: true
      required:
      - email
      - id
      - name
      - password
      - role
    Report:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        admin:
          type: integer
          readOnly: true
        admin_name:
          type: string
          readOnly: true
        generated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - admin
      - admin_name
      - generated_at
      - id
    Reward:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        points_required:
          type: integer
          maximum: 2147483647
          minimum: 0
      required:
      - id
      - name
      - points_required
    RoleEnum:
      enum:
      - user
      - admin
      type: string
      description: |-
        * `user` - User
        * `admin` - Admin
    Showtime:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        movie:
          type: integer
        movie_title:
          type: string
          readOnly: true
        date:
          type: string
          format: date
        time:
          type: string
          format: time
      required:
      - date
      - id
      - movie
      - movie_title
      - time
    StatusEnum:
      enum:
      - pending
      - confirmed
      - cancelled
      type: string
      description: |-
        * `pending` - Pending
        * `confirmed` - Confirmed
        * `cancelled` - Cancelled
    Ticket:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        booking:
          type: integer
          readOnly: true
        showtime:
          type: integer
        seat:
          type: integer
        seat_number:
          type: string
          readOnly: true
        ticket_code:
          type: string
          maxLength: 100
        qr_code:
          type: string
          maxLength: 255
      required:
      - booking
      - id
      - qr_code
      - seat
      - seat_number
      - showtime
      - ticket_code
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          writeOnly: true
      required:
      - access
      - refresh
    User:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
          maxLength: 254
        points:
          type: integer
          maximum: 2147483647
          minimum: 0
        role:
          $ref: '#/components/schemas/RoleEnum'
        profile:
          allOf:
          - $ref: '#/components/schemas/Profile'
          readOnly: true
      required:
      - email
      - id
      - name
      - profile
    UserUpdate:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
          maxLength: 254
      required:
      - email
      - name
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
